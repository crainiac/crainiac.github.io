<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>>crain</title>
  <style>
    html {
      background-color: #191919;
      scrollbar-color: #9b9b9b #191919;
    }
    body {
      margin: 0 auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      text-align: center;
      visibility: hidden;
    }
    body.ready { visibility: visible; }
    img, svg { width: 100%; height: auto; max-height: 100vh; }
  </style>
  <script type="module">
    const slug = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, ''));
    async function main() {
      try {
        const r = await fetch('/redirects.json', { cache: 'no-cache' });
        if (r.ok) {
          const map = await r.json();
          const dest = map?.[slug];
          if (dest) {
            location.replace(dest);
            return;
          }
        }
      } catch (err) {
        console.error(err);
      }
      const r = await fetch('/comb_gray.svg');
      if (!r.ok) throw new Error('failed to load svg');
      document.body.innerHTML = await r.text();
      document.body.classList.add('ready');
    }
    main();
  </script>
</head>
<body></body>
</html>
